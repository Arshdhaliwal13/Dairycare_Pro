<!DOCTYPE html>
<html lang="pa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ਖਰਚਾ - DairyCare Pro</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="dues.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <h1 class="page-title">💰 ਖਰਚਾ ਹਿਸਾਬ</h1>
        <p class="subtitle">ਆਪਣੇ ਰੋਜ਼ਾਨਾ ਦੇ ਖਰਚਿਆਂ ਦਾ ਹਿਸਾਬ ਰੱਖੋ</p>

        <!-- Total Expense Display -->
        <div class="income-section card" style="background:#e0f2fe;">
            <div><strong>📊 ਕੁੱਲ ਖਰਚਾ (ਫਿਲਟਰ ਅਨੁਸਾਰ)</strong></div>
            <div><span class="amount" id="totalExpense">₹0.00</span></div>
        </div>

        <!-- Filter Card -->
        <div class="card filters-card">
            <h2>🔍 ਫਿਲਟਰ (ਤਾਰੀਖ਼ ਰੇਂਜ)</h2>
            <div class="filters-grid">
                <div class="filter-group">
                    <label>ਤੋਂ</label>
                    <input type="date" id="filterStart" class="form-control">
                </div>
                <div class="filter-group">
                    <label>ਤੱਕ</label>
                    <input type="date" id="filterEnd" class="form-control">
                </div>
                <div class="filter-actions">
                    <button id="applyFilterBtn" class="btn btn-sm">ਦਿਖਾਓ</button>
                    <button id="resetFilterBtn" class="btn btn-sm">ਰੀਸੈੱਟ</button>
                </div>
            </div>
        </div>

        <!-- Add Expense Form -->
        <div class="card expense-form">
            <h2>📝 ਨਵਾਂ ਖਰਚਾ</h2>
            <div class="form-row">
                <div class="form-group"><label>📅 ਤਾਰੀਖ਼</label><input type="date" id="expenseDate"
                        class="form-control"></div>
                <div class="form-group"><label>💰 ਰਕਮ (₹)</label><input type="number" id="expenseAmount"
                        class="form-control" step="0.01"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>📦 ਸਮਾਨ / ਕੰਮ</label><input type="text" id="expenseItem"
                        class="form-control"></div>
                <div class="form-group"><label>📝 ਵੇਰਵਾ (ਚਾਹਵੋ)</label><input type="text" id="expenseNote"
                        class="form-control"></div>
            </div>
            <div class="form-actions">
                <button id="saveExpenseBtn" class="btn btn-primary">➕ ਖਰਚਾ ਸੇਵ ਕਰੋ</button>
                <button id="clearExpenseFormBtn" class="btn btn-secondary">🔄 ਸਾਫ਼ ਕਰੋ</button>
            </div>
        </div>

        <!-- Expenses Table -->
        <div class="card transactions-card">
            <h2>📋 ਖਰਚੇ ਦੀ ਸੂਚੀ</h2>
            <div class="table-responsive">
                <table id="expenseTable" class="table">
                    <thead>
                        <tr>
                            <th>ਤਾਰੀਖ਼</th>
                            <th>ਸਮਾਨ</th>
                            <th>ਰਕਮ (₹)</th>
                            <th>ਵੇਰਵਾ</th>
                            <th>ਕਾਰਵਾਈ</th>
                        </tr>
                    </thead>
                    <tbody id="expenseBody">
                        <tr>
                            <td colspan="5" class="text-center">ਕੋਈ ਖਰਚਾ ਨਹੀਂ</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Delete All Card -->
        <div class="card reports-card">
            <h2>🗑️ ਹੋਰ</h2>
            <button id="deleteAllBtn" class="btn btn-danger">🗑️ ਸਾਰੇ ਖਰਚੇ ਮਿਟਾਓ</button>
            <p class="text-muted" style="font-size:0.8rem; margin-top:0.5rem;">ਨੋਟ: ਸਾਰਾ ਡਾਟਾ ਮਿਟਾਉਣ ਨਾਲ ਖਰਚੇ 0 ਹੋ ਜਾਣਗੇ
            </p>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../assets/script.js"></script>
    <script src="../assets/dashboard.js"></script>
    <script src="dues.js"></script>
</body>

</html>
