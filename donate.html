<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਸਹਿਯੋਗ / Donate - DairyCare Pro</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* Minimal styles for donate page – matches card look of about.html */
        .donate-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .donate-qr {
            width: 220px;
            height: 220px;
            margin: 1.5rem auto;
            border: 3px solid #2a9d8f;
            border-radius: 24px;
            padding: 12px;
            background: white;
            box-shadow: 0 8px 24px rgba(42, 157, 143, 0.15);
        }
        .donate-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .humble-text {
            font-size: 1.1rem;
            line-height: 1.8;
            background: #e9f5ef;
            padding: 1rem;
            border-radius: 20px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <div class="donate-container">
            <h1>❤️ ਸਹਿਯੋਗ (Donate / Support)</h1>
            <div class="humble-text">
                <p>ਜੇਕਰ ਇਹ ਐਪ ਤੁਹਾਡੇ ਰੋਜ਼ਾਨਾ ਡੇਅਰੀ ਕੰਮ ਵਿੱਚ ਥੋੜ੍ਹੀ ਵੀ ਮਦਦ ਕਰਦੀ ਹੈ, ਤਾਂ ਤੁਸੀਂ ਆਪਣੀ ਮਰਜ਼ੀ ਨਾਲ ਥੋੜ੍ਹਾ ਜਿਹਾ ਸਹਿਯੋਗ ਕਰ ਸਕਦੇ ਹੋ।</p>
                <p>ਇਹ ਸਿਰਫ਼ ਤੁਹਾਡੀ ਖੁਸ਼ੀ ਅਤੇ ਸ਼ੁਕਰੀਆ ਲਈ ਹੈ — <strong>ਕੋਈ ਪਾਬੰਦੀ ਨਹੀਂ, ਕੋਈ ਜ਼ਰੂਰਤ ਨਹੀਂ।</strong></p>
                <p>ਤੁਹਾਡੇ ਦੁਆਰਾ ਭੇਜੀ ਗਈ ਹਰ ਰਕਮ ਸਾਡੇ ਲਈ ਹੌਸਲਾ ਹੈ।</p>
            </div>
            <div class="donate-qr">
                <img src="assets/images/upi-qr.png" alt="UPI QR Code">
            </div>
            <p style="margin-top: 30px;">ਧੰਨਵਾਦ! 🙏</p>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="assets/script.js"></script>
    <script src="assets/dashboard.js"></script>
</body>
</html>
